<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Sticker POS</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header class="header">
    <h1>🚀 AI Sticker POS</h1>
</header>

<section class="dashboard">

    <div class="card stat">
        <h3>ยอดขายวันนี้</h3>
        <p id="todaySales">0 บาท</p>
    </div>

    <div class="card stat">
        <h3>ออเดอร์วันนี้</h3>
        <p id="todayOrders">0</p>
    </div>

    <div class="card stat">
        <h3>สินค้าทั้งหมด</h3>
        <p id="totalProducts">0</p>
    </div>

</section>

<section class="actions">

    <button id="resetBtn">
        🗑️ Reset
    </button>

    <button id="backupBtn">
        💾 Backup
    </button>

    <button id="restoreBtn">
        📂 Load Backup
    </button>

    <input
        type="file"
        id="restoreFile"
        accept=".json"
        style="display:none"
    >

    <button id="addProductBtn">
        ➕ เพิ่มสินค้า
    </button>

</section>

<section class="searchBar">

    <input
        type="text"
        id="searchInput"
        placeholder="ค้นหาสินค้า..."
    >

</section>

<section>

    <h2>สินค้า</h2>
    <div id="productGrid"></div>
    
    <div
        id="productGrid"
        class="product-grid">
    </div>

</section>

<input
    type="file"
    id="imagePicker"
    accept="image/*"
    style="display:none"
>

<hr>

<section class="cart-section">

    <h2>🛒 ตะกร้าสินค้า</h2>

    <div id="cartList"></div>

    <h3>
        รวม:
        ฿<span id="cartTotal">0</span>
    </h3>

</section>

<script src="app.js"></script>

<hr>

<button onclick="exportCSV()">
📄 Export CSV
</button>

<button onclick="clearDailySales()">
🧹 ล้างยอดขายวันนี้
</button>

<hr>

<h2>📋 ประวัติการขาย</h2>

<div id="salesHistory"></div>

<hr>

<button
id="checkoutBtn"
style="
width:100%;
padding:16px;
font-size:20px;
font-weight:bold;
margin-top:20px;
">
🛒 Checkout
</button>
    
</body>
</html>
